spring:
  config:
    import: aws-parameterstore:/prod/lovermbti/

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${db.password}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${oauth.google.secret}
            redirect-uri: ${APP_BASE_URL}/login/oauth2/code/google
            scope:
              - email
              - profile
              - openid

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${oauth.kakao.secret}
            client-authentication-method: client_secret_post
            redirect-uri: ${APP_BASE_URL}/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - profile_image
            client-name: Kakao

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${oauth.naver.secret}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: ${APP_BASE_URL}/login/oauth2/code/naver
            scope:
              - name
              - email

        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: 8080

jwt:
  secret: ${jwt.secret}

kakao:
  admin-key: ${kakao.admin-key}
  map:
    rest-api-key: ${kakao.map.rest-api-key}

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ap-northeast-2

gemini:
  api:
    key: ${gemini.api-key}
  model:
    name: gemini-2.5-flash
    temperature: 0.4
    max-output-tokens: 512
